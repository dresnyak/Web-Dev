<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">
    <main class="container">
        <section class="right-section">
            <h1 class="promo-title">Посмотрите, какими моментами из жизни поделились ваши <span class="text-over-pic"><strong>близкие друзья</strong></span>.</h1>
            <img class="picture" src="-erGonz07kB.webp" alt="">
        </section>
      <section class="login-section">
        <div class="login-box">
          <h2 class="login-title">Войти в Instagram</h2>

          <form class="login-form" action="#" method="post">
            <label for="username" class="sr-only">Имя пользователя, номер мобильного телефона или эл. адрес</label>
            <input type="text" id="username" name="username" placeholder="Имя пользователя, номер мобильного телефона или эл. адрес">

            <label for="password" class="sr-only">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Пароль">

            <button type="submit" class="btn-login">Войти</button>
          </form>

          <a href="#" class="forgot-link">Забыли пароль?</a>

          <div class="separator">
            <span class="line"></span>
            <span class="or-text">ИЛИ</span>
            <span class="line"></span>
          </div>

          <a href="#" class="fb-login">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877f2">
              <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/>
            </svg>
            Войти через Facebook
          </a>

          <a href="#" class="btn-create">Создать новый аккаунт</a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
