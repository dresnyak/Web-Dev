<div class="product-card">
  <div class="gallery">
    <div class="main-image-container">
      <button class="nav-btn prev" (click)="prevImage()" *ngIf="product.images.length > 1">&lt;</button>
      <a [href]="product.link" target="_blank" rel="noopener noreferrer">
        <img
          [src]="product.images[selectedImageIndex]"
          [alt]="product.name"
          class="main-image"
        />
      </a>
      <button class="nav-btn next" (click)="nextImage()" *ngIf="product.images.length > 1">&gt;</button>
    </div>
    <div class="thumbnails" *ngIf="product.images.length > 1">
      <img
        *ngFor="let img of product.images; let i = index"
        [src]="img"
        [alt]="product.name + ' image ' + (i + 1)"
        [class.active]="i === selectedImageIndex"
        class="thumbnail"
        (click)="selectImage(i)"
      />
    </div>
  </div>

  <div class="product-info">
    <a [href]="product.link" target="_blank" rel="noopener noreferrer" class="product-name-link">
      <h3 class="product-name">{{ product.name }}</h3>
    </a>

    <div class="rating">
      <span *ngFor="let star of stars" [class]="getStarClass(star)">&#9733;</span>
      <span class="rating-value">{{ product.rating }}</span>
    </div>

    <p class="description">{{ product.description }}</p>

    <div class="price">{{ formatPrice(product.price) }} &#8376;</div>

    <div class="actions">
      <a [href]="product.link" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
        Купить на Kaspi.kz
      </a>
      <div class="share-container">
        <button class="btn btn-share" (click)="toggleShareMenu()">
          Поделиться
        </button>
        <div class="share-menu" *ngIf="showShareMenu">
          <button class="share-option whatsapp" (click)="shareWhatsApp()">
            <span class="share-icon">W</span> WhatsApp
          </button>
          <button class="share-option telegram" (click)="shareTelegram()">
            <span class="share-icon">T</span> Telegram
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
